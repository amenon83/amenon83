# Weekly arXiv physics.med-ph feed updater.
# Place this file at .github/workflows/arxiv-feed.yml in the profile repo,
# with update_feed.py at feed/update_feed.py.
name: Update arXiv feed

on:
  schedule:
    # Mondays at 13:00 UTC
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arxiv-feed
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update README feed block
        run: python feed/update_feed.py --readme README.md

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README unchanged; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: update arXiv physics.med-ph feed"
            git push
          fi
